spring:
  application:
    name: jpetstore-test

  datasource:
    url: jdbc:mysql://localhost:3306/jpetstore?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jpetstore.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.jpetstore.mapper: debug