server:
  port: 8080

spring:
  application:
    name: jpetstore

  datasource:
    url: jdbc:mysql://localhost:3306/jpetstore?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jpetstore.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.jpetstore.mapper: debug

debug: false