<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-4">
        <h2 class="page-title"><i class="bi bi-person-circle me-2"></i>个人中心</h2>
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body text-center p-4">
                        <div class="bg-primary bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 100px; height: 100px;">
                            <i class="bi bi-person-fill text-white" style="font-size: 3rem;"></i>
                        </div>
                        <h4 class="fw-bold" th:text="${user.firstname} + ' ' + ${user.lastname}">用户名</h4>
                        <p class="text-muted mb-1" th:text="'@' + ${user.userid}">@userid</p>
                        <p class="text-muted" th:text="${user.email}">email@example.com</p>
                        <hr>
                        <div class="d-grid gap-2">
                            <a th:href="@{/orders}" class="btn btn-outline-primary"><i class="bi bi-receipt me-2"></i>我的订单</a>
                            <a th:href="@{/cart}" class="btn btn-outline-primary"><i class="bi bi-cart3 me-2"></i>购物车</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="checkout-section">
                    <h4><i class="bi bi-person-lines-fill me-2"></i>基本信息</h4>
                    <div class="row g-3">
                        <div class="col-md-6"><div class="text-muted small">用户名</div><div class="fw-bold" th:text="${user.userid}">userid</div></div>
                        <div class="col-md-6"><div class="text-muted small">邮箱</div><div class="fw-bold" th:text="${user.email}">email</div></div>
                        <div class="col-md-6"><div class="text-muted small">名</div><div class="fw-bold" th:text="${user.firstname}">firstname</div></div>
                        <div class="col-md-6"><div class="text-muted small">姓</div><div class="fw-bold" th:text="${user.lastname}">lastname</div></div>
                        <div class="col-md-6"><div class="text-muted small">电话</div><div class="fw-bold" th:text="${user.phone}">phone</div></div>
                        <div class="col-md-6"><div class="text-muted small">状态</div><span class="badge bg-success" th:text="${user.status}">OK</span></div>
                    </div>
                </div>
                <div class="checkout-section">
                    <h4><i class="bi bi-geo-alt me-2"></i>地址信息</h4>
                    <div class="row g-3">
                        <div class="col-12"><div class="text-muted small">地址</div><div class="fw-bold" th:text="${user.addr1}">addr1</div></div>
                        <div class="col-md-4"><div class="text-muted small">城市</div><div class="fw-bold" th:text="${user.city}">city</div></div>
                        <div class="col-md-4"><div class="text-muted small">州/省</div><div class="fw-bold" th:text="${user.state}">state</div></div>
                        <div class="col-md-4"><div class="text-muted small">邮编</div><div class="fw-bold" th:text="${user.zip}">zip</div></div>
                        <div class="col-md-6"><div class="text-muted small">国家</div><div class="fw-bold" th:text="${user.country}">country</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
