<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-4">
        <h2 class="page-title"><i class="bi bi-credit-card me-2"></i>订单结算</h2>
        <form id="checkoutForm">
            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="checkout-section">
                        <h4><i class="bi bi-geo-alt me-2"></i>收货地址</h4>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">收货人姓 *</label><input type="text" class="form-control" name="shiptolastname" th:value="${user.lastname}" required></div>
                            <div class="col-md-6"><label class="form-label">收货人名 *</label><input type="text" class="form-control" name="shiptofirstname" th:value="${user.firstname}" required></div>
                            <div class="col-12"><label class="form-label">收货地址 *</label><input type="text" class="form-control" name="shipaddr1" th:value="${user.addr1}" required></div>
                            <div class="col-md-4"><label class="form-label">城市 *</label><input type="text" class="form-control" name="shipcity" th:value="${user.city}" required></div>
                            <div class="col-md-4"><label class="form-label">州/省 *</label><input type="text" class="form-control" name="shipstate" th:value="${user.state}" required></div>
                            <div class="col-md-4"><label class="form-label">邮编 *</label><input type="text" class="form-control" name="shipzip" th:value="${user.zip}" required></div>
                            <div class="col-md-6"><label class="form-label">国家 *</label><input type="text" class="form-control" name="shipcountry" th:value="${user.country}" required></div>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <h4><i class="bi bi-house me-2"></i>账单地址</h4>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">账单人姓 *</label><input type="text" class="form-control" name="billtolastname" th:value="${user.lastname}" required></div>
                            <div class="col-md-6"><label class="form-label">账单人名 *</label><input type="text" class="form-control" name="billtofirstname" th:value="${user.firstname}" required></div>
                            <div class="col-12"><label class="form-label">账单地址 *</label><input type="text" class="form-control" name="billaddr1" th:value="${user.addr1}" required></div>
                            <div class="col-md-4"><label class="form-label">城市 *</label><input type="text" class="form-control" name="billcity" th:value="${user.city}" required></div>
                            <div class="col-md-4"><label class="form-label">州/省 *</label><input type="text" class="form-control" name="billstate" th:value="${user.state}" required></div>
                            <div class="col-md-4"><label class="form-label">邮编 *</label><input type="text" class="form-control" name="billzip" th:value="${user.zip}" required></div>
                            <div class="col-md-6"><label class="form-label">国家 *</label><input type="text" class="form-control" name="billcountry" th:value="${user.country}" required></div>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <h4><i class="bi bi-credit-card-2-front me-2"></i>支付信息</h4>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">信用卡类型 *</label><select class="form-select" name="cardtype" required><option value="Visa">Visa</option><option value="MasterCard">MasterCard</option><option value="American Express">American Express</option></select></div>
                            <div class="col-md-6"><label class="form-label">信用卡号 *</label><input type="text" class="form-control" name="creditcard" placeholder="请输入信用卡号" required></div>
                            <div class="col-md-6"><label class="form-label">有效期 *</label><input type="text" class="form-control" name="exprdate" placeholder="MM/YY" required></div>
                            <div class="col-md-6"><label class="form-label">快递公司 *</label><select class="form-select" name="courier" required><option value="UPS">UPS</option><option value="FedEx">FedEx</option><option value="DHL">DHL</option><option value="USPS">USPS</option></select></div>
                            <div class="col-md-6"><label class="form-label">语言</label><select class="form-select" name="locale"><option value="chinese">中文</option><option value="english">English</option></select></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="checkout-section sticky-top" style="top: 80px;">
                        <h4><i class="bi bi-receipt me-2"></i>订单摘要</h4>
                        <div th:each="cartItem : ${cart.cartItems}" class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
                            <div><div class="fw-bold" th:text="${cartItem.item.itemid}">商品编号</div><small class="text-muted" th:text="'x' + ${cartItem.quantity}">数量</small></div>
                            <span class="fw-bold" th:text="'¥' + ${cartItem.totalPrice}">¥0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4"><span class="fs-5 fw-bold">合计</span><span class="fs-4 fw-bold text-danger" th:text="'¥' + ${cart.subTotal}">¥0.00</span></div>
                        <button type="submit" class="btn btn-gradient w-100 py-3 fs-5"><i class="bi bi-check-circle me-2"></i>确认下单</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var formData = new FormData(this);
        var order = {
            userid: sessionUser, shipaddr1: formData.get('shipaddr1'), shipaddr2: '', shipcity: formData.get('shipcity'),
            shipstate: formData.get('shipstate'), shipzip: formData.get('shipzip'), shipcountry: formData.get('shipcountry'),
            billaddr1: formData.get('billaddr1'), billaddr2: '', billcity: formData.get('billcity'), billstate: formData.get('billstate'),
            billzip: formData.get('billzip'), billcountry: formData.get('billcountry'), courier: formData.get('courier'),
            totalprice: 0, billtofirstname: formData.get('billtofirstname'), billtolastname: formData.get('billtolastname'),
            shiptofirstname: formData.get('shiptofirstname'), shiptolastname: formData.get('shiptolastname'),
            creditcard: formData.get('creditcard'), exprdate: formData.get('exprdate'),
            cardtype: formData.get('cardtype'), locale: formData.get('locale')
        };
        fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(order) })
            .then(function(res) { return res.json(); }).then(function(data) { if (data.code === 200) { window.location.href = '/orders'; } else { alert(data.message); } })
            .catch(function() { alert('网络错误，请重试'); });
    });
    var sessionUser = '';
</script>
</body>
</html>
