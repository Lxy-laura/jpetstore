<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card auth-card">
                    <div class="card-header"><h3><i class="bi bi-person-plus me-2"></i>用户注册</h3></div>
                    <div class="card-body">
                        <div class="alert d-none" id="registerMsg" role="alert"></div>
                        <form id="registerForm">
                            <div class="row g-3">
                                <div class="col-md-6"><label class="form-label fw-bold">用户名 *</label><input type="text" class="form-control" name="userid" placeholder="请输入用户名" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">邮箱 *</label><input type="email" class="form-control" name="email" placeholder="请输入邮箱" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">密码 *</label><input type="password" class="form-control" name="password" placeholder="请输入密码" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">确认密码 *</label><input type="password" class="form-control" name="confirmPassword" placeholder="请再次输入密码" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">名 *</label><input type="text" class="form-control" name="firstname" placeholder="请输入名" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">姓 *</label><input type="text" class="form-control" name="lastname" placeholder="请输入姓" required></div>
                                <div class="col-12"><label class="form-label fw-bold">地址 *</label><input type="text" class="form-control" name="addr1" placeholder="请输入地址" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">城市 *</label><input type="text" class="form-control" name="city" placeholder="请输入城市" required></div>
                                <div class="col-md-6"><label class="form-label fw-bold">州/省 *</label><input type="text" class="form-control" name="state" placeholder="请输入州/省" required></div>
                                <div class="col-md-4"><label class="form-label fw-bold">邮编 *</label><input type="text" class="form-control" name="zip" placeholder="请输入邮编" required></div>
                                <div class="col-md-4"><label class="form-label fw-bold">国家 *</label><input type="text" class="form-control" name="country" placeholder="请输入国家" required></div>
                                <div class="col-md-4"><label class="form-label fw-bold">电话 *</label><input type="text" class="form-control" name="phone" placeholder="请输入电话" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-4"><i class="bi bi-person-plus me-2"></i>注册</button>
                        </form>
                        <div class="text-center mt-3">
                            <span class="text-muted">已有账号？</span>
                            <a th:href="@{/login}" class="text-decoration-none fw-bold">立即登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var formData = new FormData(this);
        var password = formData.get('password');
        var confirmPassword = formData.get('confirmPassword');
        if (password !== confirmPassword) {
            var msgDiv = document.getElementById('registerMsg');
            msgDiv.className = 'alert alert-danger'; msgDiv.textContent = '两次输入的密码不一致'; msgDiv.classList.remove('d-none'); return;
        }
        var account = {
            userid: formData.get('userid'), email: formData.get('email'), firstname: formData.get('firstname'),
            lastname: formData.get('lastname'), addr1: formData.get('addr1'), city: formData.get('city'),
            state: formData.get('state'), zip: formData.get('zip'), country: formData.get('country'), phone: formData.get('phone'),
            signOn: { username: formData.get('userid'), password: password },
            profile: { userid: formData.get('userid'), langpref: 'chinese', favcategory: 'DOGS' }
        };
        fetch('/api/account/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(account) })
            .then(function(res) { return res.json(); }).then(function(data) {
            var msgDiv = document.getElementById('registerMsg');
            if (data.code === 200) { msgDiv.className = 'alert alert-success'; msgDiv.textContent = '注册成功！即将跳转到登录页面...'; msgDiv.classList.remove('d-none'); setTimeout(function() { window.location.href = '/login'; }, 1500); }
            else { msgDiv.className = 'alert alert-danger'; msgDiv.textContent = data.message; msgDiv.classList.remove('d-none'); }
        }).catch(function() { var msgDiv = document.getElementById('registerMsg'); msgDiv.className = 'alert alert-danger'; msgDiv.textContent = '网络错误，请重试'; msgDiv.classList.remove('d-none'); });
    });
</script>
</body>
</html>
