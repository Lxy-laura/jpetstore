<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { min-height: calc(100vh - 56px); }
        .sidebar a:hover { background-color: rgba(255,255,255,0.1); }
        .content-area { min-height: calc(100vh - 56px); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .product-img-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-paw-fill me-2"></i>JPetStore 后台管理</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-light"><i class="bi bi-person-circle me-1"></i><span th:text="${session.user.firstname}"></span> <span class="badge bg-danger">管理员</span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="nav-link btn btn-link text-light"><i class="bi bi-box-arrow-right me-1"></i>退出</button>
            </form>
        </div>
    </div>
</nav>

<div class="row g-0">
    <div class="col-md-2 bg-dark text-white sidebar">
        <div class="p-4">
            <h5 class="mb-4"><i class="bi bi-grid-3x3-gap me-2"></i>管理菜单</h5>
            <ul class="nav flex-column">
                <li class="nav-item mb-1">
                    <a href="#dashboard" class="nav-link text-white active" data-section="dashboard">
                        <i class="bi bi-speedometer2 me-2"></i>仪表盘
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="#categories" class="nav-link text-white" data-section="categories">
                        <i class="bi bi-grid me-2"></i>分类管理
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="#products" class="nav-link text-white" data-section="products">
                        <i class="bi bi-box-seam me-2"></i>产品管理
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="#orders" class="nav-link text-white" data-section="orders">
                        <i class="bi bi-receipt me-2"></i>订单管理
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="#users" class="nav-link text-white" data-section="users">
                        <i class="bi bi-people me-2"></i>用户管理
                    </a>
                </li>
                <hr class="my-3">
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link text-white">
                        <i class="bi bi-arrow-left me-2"></i>返回前台
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="col-md-10 content-area bg-light">
        <div class="p-4">
            <!-- 仪表盘 -->
            <div id="section-dashboard" class="content-section">
                <h2 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>仪表盘</h2>
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="card stat-card bg-primary text-white">
                            <div class="card-body">
                                <div class="float-end"><i class="bi bi-grid text-4xl opacity-50"></i></div>
                                <h6 class="text-white-80">分类数量</h6>
                                <h3 class="fw-bold" th:text="${categoryCount}">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-success text-white">
                            <div class="card-body">
                                <div class="float-end"><i class="bi bi-box-seam text-4xl opacity-50"></i></div>
                                <h6 class="text-white-80">产品数量</h6>
                                <h3 class="fw-bold" th:text="${productCount}">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-warning text-white">
                            <div class="card-body">
                                <div class="float-end"><i class="bi bi-receipt text-4xl opacity-50"></i></div>
                                <h6 class="text-white-80">订单数量</h6>
                                <h3 class="fw-bold" th:text="${orderCount}">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-info text-white">
                            <div class="card-body">
                                <div class="float-end"><i class="bi bi-people text-4xl opacity-50"></i></div>
                                <h6 class="text-white-80">用户数量</h6>
                                <h3 class="fw-bold" th:text="${userCount}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-4 card">
                    <div class="card-header"><h5><i class="bi bi-info-circle me-2"></i>快捷操作</h5></div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-2"><button class="btn btn-primary w-100" onclick="showModal('category')"><i class="bi bi-plus-circle me-1"></i>添加分类</button></div>
                            <div class="col-md-2"><button class="btn btn-success w-100" onclick="showModal('product')"><i class="bi bi-plus-circle me-1"></i>添加产品</button></div>
                            <div class="col-md-2"><button class="btn btn-warning w-100" onclick="loadOrders()"><i class="bi bi-refresh me-1"></i>刷新订单</button></div>
                            <div class="col-md-2"><button class="btn btn-info w-100" onclick="loadUsers()"><i class="bi bi-refresh me-1"></i>刷新用户</button></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分类管理 -->
            <div id="section-categories" class="content-section d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-grid me-2"></i>分类管理</h2>
                    <button class="btn btn-primary" onclick="showModal('category')"><i class="bi bi-plus-circle me-1"></i>添加分类</button>
                </div>
                <table class="table table-striped table-hover">
                    <thead class="bg-dark text-white">
                    <tr><th>分类ID</th><th>名称</th><th>描述</th><th>操作</th></tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                </table>
            </div>

            <!-- 产品管理 -->
            <div id="section-products" class="content-section d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-box-seam me-2"></i>产品管理</h2>
                    <button class="btn btn-success" onclick="showModal('product')"><i class="bi bi-plus-circle me-1"></i>添加产品</button>
                </div>
                <table class="table table-striped table-hover">
                    <thead class="bg-dark text-white">
                    <tr><th>图片</th><th>产品ID</th><th>分类</th><th>名称</th><th>价格</th><th>状态</th><th>描述</th><th>操作</th></tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>

            <!-- 订单管理 -->
            <div id="section-orders" class="content-section d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-receipt me-2"></i>订单管理</h2>
                    <button class="btn btn-warning" onclick="loadOrders()"><i class="bi bi-refresh me-1"></i>刷新</button>
                </div>
                <table class="table table-striped table-hover">
                    <thead class="bg-dark text-white">
                    <tr><th>订单ID</th><th>用户</th><th>日期</th><th>总价</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="orderTableBody"></tbody>
                </table>
            </div>

            <!-- 用户管理 -->
            <div id="section-users" class="content-section d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-people me-2"></i>用户管理</h2>
                    <button class="btn btn-info" onclick="loadUsers()"><i class="bi bi-refresh me-1"></i>刷新</button>
                </div>
                <table class="table table-striped table-hover">
                    <thead class="bg-dark text-white">
                    <tr><th>用户名</th><th>邮箱</th><th>姓名</th><th>角色</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div class="modal fade" id="dataModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加数据</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="dataForm" enctype="multipart/form-data">
                    <input type="hidden" id="formType">
                    <input type="hidden" id="formId">
                    <div id="formFields"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitForm()">保存</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detailTitle">详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailContent"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let modalInstance = null;

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.nav-link[data-section]').forEach(a => {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.content-section').forEach(el => el.classList.add('d-none'));
                document.getElementById('section-' + this.dataset.section).classList.remove('d-none');
                document.querySelectorAll('.nav-link[data-section]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        loadCategories(); loadProducts(); loadOrders(); loadUsers();
    });

    function showModal(type, data = null) {
        document.getElementById('formType').value = type;
        document.getElementById('formId').value = data ? (type === 'category' ? data.catid : data.productid) : '';
        document.getElementById('modalTitle').textContent = data ? '编辑' + (type === 'category' ? '分类' : '产品') : '添加' + (type === 'category' ? '分类' : '产品');

        let fields = '';
        if (type === 'category') {
            fields = `
                <div class="mb-3">
                    <label class="form-label">分类ID</label>
                    <input type="text" class="form-control" id="catid" ${data ? 'readonly' : 'required'} value="${data ? data.catid : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-control" id="name" required value="${data ? data.name : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="description">${data ? data.description : ''}</textarea>
                </div>
            `;
        } else if (type === 'product') {
            const imgHtml = (data && data.image)
                ? `<img src="${data.image}" class="img-fluid rounded mb-2" style="max-height: 150px;" id="currentImage">`
                : '';
            const statusOptions = `
                <option value="ON_SALE" ${data && data.status === 'ON_SALE' ? 'selected' : ''}>在售</option>
                <option value="OFF_SALE" ${data && data.status === 'OFF_SALE' ? 'selected' : ''}>下架</option>
            `;
            fields = `
                <div class="mb-3">
                    <label class="form-label">产品ID</label>
                    <input type="text" class="form-control" id="productid" ${data ? 'readonly' : 'required'} value="${data ? data.productid : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="category" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-control" id="name" required value="${data ? data.name : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">价格 (元) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="price" required step="0.01" min="0.01" value="${data && data.price != null ? data.price : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">状态</label>
                    <select class="form-select" id="status">${statusOptions}</select>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="description">${data ? data.description : ''}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">产品图片</label>
                    ${imgHtml}
                    <input type="file" class="form-control" id="image" name="image" accept="image/*">
                    <div class="mt-2" id="imagePreview" style="display: none;">
                        <img id="previewImg" src="" class="img-fluid rounded" style="max-height: 200px;">
                    </div>
                    <div class="form-text">选择图片后会自动预览，编辑时如不选择新图片则保留原图片</div>
                </div>
            `;
        }
        document.getElementById('formFields').innerHTML = fields;

        if (type === 'product') {
            fetch('/api/admin/categories').then(res => res.json()).then(res => {
                const select = document.getElementById('category');
                res.data.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.catid;
                    opt.textContent = cat.name;
                    if (data && data.category === cat.catid) opt.selected = true;
                    select.appendChild(opt);
                });
            });

            setTimeout(() => {
                const imgInput = document.getElementById('image');
                if (imgInput) {
                    imgInput.addEventListener('change', function(e) {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(event) {
                                document.getElementById('previewImg').src = event.target.result;
                                document.getElementById('imagePreview').style.display = 'block';
                                const currentImg = document.getElementById('currentImage');
                                if (currentImg) currentImg.style.display = 'none';
                            };
                            reader.readAsDataURL(file);
                        } else {
                            document.getElementById('imagePreview').style.display = 'none';
                            const currentImg = document.getElementById('currentImage');
                            if (currentImg) currentImg.style.display = 'block';
                        }
                    });
                }
            }, 100);
        }

        modalInstance = new bootstrap.Modal(document.getElementById('dataModal'));
        modalInstance.show();
    }

    function submitForm() {
        const type = document.getElementById('formType').value;
        const id = document.getElementById('formId').value;
        const url = id ? `/api/admin/${type}s/${id}` : `/api/admin/${type}s`;
        const method = id ? 'PUT' : 'POST';

        if (type === 'product') {
            const formData = new FormData();
            formData.append('productid', document.getElementById('productid').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('status', document.getElementById('status').value);
            formData.append('description', document.getElementById('description').value);
            const imgFile = document.getElementById('image').files[0];
            if (imgFile) {
                formData.append('image', imgFile);
            }

            fetch(url, { method, body: formData })
                .then(res => res.json()).then(res => {
                if (res.code === 200) {
                    modalInstance.hide();
                    loadProducts();
                    showAlert('操作成功', 'success');
                } else {
                    showAlert(res.message, 'danger');
                }
            });
        } else {
            let data = {};
            if (type === 'category') {
                data = { catid: document.getElementById('catid').value, name: document.getElementById('name').value, description: document.getElementById('description').value };
            }

            fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                .then(res => res.json()).then(res => {
                if (res.code === 200) {
                    modalInstance.hide();
                    type === 'category' ? loadCategories() : loadProducts();
                    showAlert('操作成功', 'success');
                } else {
                    showAlert(res.message, 'danger');
                }
            });
        }
    }

    function loadCategories() {
        fetch('/api/admin/categories').then(res => res.json()).then(res => {
            document.getElementById('categoryTableBody').innerHTML = res.data.map(c => `
                <tr>
                    <td>${c.catid}</td>
                    <td>${c.name}</td>
                    <td>${c.description}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick='showModal("category", ${JSON.stringify(c)})'><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger ms-1" onclick="deleteItem('categories', '${c.catid}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        });
    }

    function loadProducts() {
        fetch('/api/admin/products').then(res => res.json()).then(res => {
            document.getElementById('productTableBody').innerHTML = res.data.map(p => {
                const imgHtml = p.image
                    ? `<img src="${p.image}" class="product-img-thumb" alt="${p.name}">`
                    : '<i class="bi bi-image text-muted"></i>';
                const statusBadge = p.status === 'ON_SALE'
                    ? '<span class="badge bg-success">在售</span>'
                    : '<span class="badge bg-secondary">下架</span>';
                const toggleBtn = p.status === 'ON_SALE'
                    ? `<button class="btn btn-sm btn-warning ms-1" onclick="toggleProductStatus('${p.productid}', 'OFF_SALE')" title="下架"><i class="bi bi-arrow-down-circle"></i> 下架</button>`
                    : `<button class="btn btn-sm btn-success ms-1" onclick="toggleProductStatus('${p.productid}', 'ON_SALE')" title="上架"><i class="bi bi-arrow-up-circle"></i> 上架</button>`;
                const priceText = p.price != null ? '¥' + parseFloat(p.price).toFixed(2) : '¥0.00';
                return `
                <tr>
                    <td>${imgHtml}</td>
                    <td>${p.productid}</td>
                    <td>${p.category}</td>
                    <td>${p.name}</td>
                    <td><span class="fw-bold text-danger">${priceText}</span></td>
                    <td>${statusBadge}</td>
                    <td>${p.description || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick='showModal("product", ${JSON.stringify(p).replace(/'/g, "\\'")})'><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger ms-1" onclick="deleteItem('products', '${p.productid}')"><i class="bi bi-trash"></i></button>
                        <button class="btn btn-sm btn-info ms-1" onclick="showProductDetail('${p.productid}')"><i class="bi bi-eye"></i></button>
                        ${toggleBtn}
                    </td>
                </tr>
            `}).join('');
        });
    }

    function toggleProductStatus(productid, status) {
        const action = status === 'ON_SALE' ? '上架' : '下架';
        if (!confirm('确定要' + action + '该产品吗？')) return;
        fetch('/api/admin/products/' + productid + '/status?status=' + status, { method: 'PUT' })
            .then(res => res.json()).then(res => {
            if (res.code === 200) {
                loadProducts();
                showAlert(action + '成功', 'success');
            } else {
                showAlert(res.message, 'danger');
            }
        });
    }

    function loadOrders() {
        fetch('/api/admin/orders').then(res => res.json()).then(res => {
            document.getElementById('orderTableBody').innerHTML = res.data.map(o => `
                <tr>
                    <td>${o.orderid}</td>
                    <td>${o.userid}</td>
                    <td>${new Date(o.orderdate).toLocaleString()}</td>
                    <td>$${o.totalprice}</td>
                    <td><span class="badge ${getOrderStatusClass(o.status)}">${getOrderStatusText(o.status)}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="updateOrderStatus(${o.orderid}, '${o.status}')"><i class="bi bi-check-circle"></i> 更新状态</button>
                        <button class="btn btn-sm btn-info ms-1" onclick="showOrderDetail(${o.orderid})"><i class="bi bi-eye"></i></button>
                    </td>
                </tr>
            `).join('');
        });
    }

    function loadUsers() {
        fetch('/api/admin/users').then(res => res.json()).then(res => {
            document.getElementById('userTableBody').innerHTML = res.data.map(u => `
                <tr>
                    <td>${u.userid}</td>
                    <td>${u.email}</td>
                    <td>${u.firstname} ${u.lastname}</td>
                    <td><span class="badge ${u.role === 'ADMIN' ? 'bg-danger' : 'bg-info'}">${u.role === 'ADMIN' ? '管理员' : '普通用户'}</span></td>
                    <td>${u.status === 'OK' ? '<span class="badge bg-success">正常</span>' : '<span class="badge bg-danger">禁用</span>'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="toggleUserRole('${u.userid}', '${u.role}')">切换角色</button>
                        <button class="btn btn-sm btn-danger ms-1" onclick="deleteUser('${u.userid}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        });
    }

    function deleteItem(type, id) {
        if (!confirm('确定要删除吗？')) return;
        fetch('/api/admin/' + type + '/' + id, { method: 'DELETE' })
            .then(res => res.json()).then(res => {
            if (res.code === 200) {
                type === 'categories' ? loadCategories() : loadProducts();
                showAlert('删除成功', 'success');
            } else {
                showAlert(res.message, 'danger');
            }
        });
    }

    function deleteUser(userid) {
        if (!confirm('确定要删除该用户吗？')) return;
        fetch('/api/admin/users/' + userid, { method: 'DELETE' })
            .then(res => res.json()).then(res => {
            if (res.code === 200) {
                loadUsers();
                showAlert('删除成功', 'success');
            } else {
                showAlert(res.message, 'danger');
            }
        });
    }

    function toggleUserRole(userid, currentRole) {
        const newRole = currentRole === 'ADMIN' ? 'USER' : 'ADMIN';
        fetch('/api/admin/users/' + userid + '/role?role=' + newRole, { method: 'PUT' })
            .then(res => res.json()).then(res => {
            if (res.code === 200) {
                loadUsers();
                showAlert('角色更新成功', 'success');
            } else {
                showAlert(res.message, 'danger');
            }
        });
    }

    function updateOrderStatus(orderid, currentStatus) {
        const statuses = ['P', 'A', 'S', 'C'];
        const currentIdx = statuses.indexOf(currentStatus);
        const nextStatus = currentIdx < statuses.length - 1 ? statuses[currentIdx + 1] : 'P';
        fetch('/api/admin/orders/' + orderid + '/status?status=' + nextStatus, { method: 'PUT' })
            .then(res => res.json()).then(res => {
            if (res.code === 200) {
                loadOrders();
                showAlert('状态更新成功', 'success');
            } else {
                showAlert(res.message, 'danger');
            }
        });
    }

    function showProductDetail(productid) {
        fetch('/api/admin/products/' + productid).then(res => res.json()).then(res => {
            const p = res.data;
            const imgHtml = p.image
                ? `<img src="${p.image}" class="img-fluid rounded mb-3" style="max-height: 250px;">`
                : '<div class="bg-light rounded d-flex align-items-center justify-content-center mb-3" style="height: 200px;"><i class="bi bi-image text-muted" style="font-size: 3rem;"></i></div>';
            const priceText = p.price != null ? '¥' + parseFloat(p.price).toFixed(2) : '¥0.00';
            const statusText = p.status === 'ON_SALE' ? '<span class="badge bg-success">在售</span>' : '<span class="badge bg-secondary">下架</span>';
            document.getElementById('detailTitle').textContent = p.name + ' - 产品详情';
            document.getElementById('detailContent').innerHTML = `
                ${imgHtml}
                <p><strong>产品ID：</strong>${p.productid}</p>
                <p><strong>分类：</strong>${p.category}</p>
                <p><strong>名称：</strong>${p.name}</p>
                <p><strong>价格：</strong><span class="text-danger fw-bold">${priceText}</span></p>
                <p><strong>状态：</strong>${statusText}</p>
                <p><strong>描述：</strong>${p.description || '无'}</p>
            `;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        });
    }

    function showOrderDetail(orderid) {
        fetch('/api/admin/orders/' + orderid).then(res => res.json()).then(res => {
            const o = res.data;
            document.getElementById('detailTitle').textContent = '订单详情 - ' + orderid;
            let itemsHtml = '';
            if (o.orderItems && o.orderItems.length > 0) {
                itemsHtml = '<table class="table"><thead><tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr></thead><tbody>';
                o.orderItems.forEach(item => {
                    itemsHtml += `<tr><td>${item.itemid}</td><td>${item.quantity}</td><td>$${item.unitprice}</td><td>$${(item.quantity * item.unitprice).toFixed(2)}</td></tr>`;
                });
                itemsHtml += '</tbody></table>';
            } else {
                itemsHtml = '<p>暂无商品明细</p>';
            }
            document.getElementById('detailContent').innerHTML = `
                <p><strong>订单ID：</strong>${o.orderid}</p>
                <p><strong>用户：</strong>${o.userid}</p>
                <p><strong>日期：</strong>${new Date(o.orderdate).toLocaleString()}</p>
                <p><strong>总价：</strong><span class="text-danger fw-bold">$${o.totalprice}</span></p>
                <p><strong>状态：</strong><span class="badge ${getOrderStatusClass(o.status)}">${getOrderStatusText(o.status)}</span></p>
                <hr>
                <h6>商品明细</h6>
                ${itemsHtml}
            `;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        });
    }

    function getOrderStatusClass(status) {
        switch(status) {
            case 'P': return 'bg-warning';
            case 'A': return 'bg-info';
            case 'S': return 'bg-primary';
            case 'C': return 'bg-success';
            default: return 'bg-secondary';
        }
    }

    function getOrderStatusText(status) {
        switch(status) {
            case 'P': return '待处理';
            case 'A': return '已确认';
            case 'S': return '已发货';
            case 'C': return '已完成';
            default: return status;
        }
    }

    function showAlert(message, type) {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-' + type + ' alert-dismissible fade show position-fixed';
        alertDiv.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 250px;';
        alertDiv.innerHTML = message + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>';
        document.body.appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), 3000);
    }
</script>
</body>
</html>
