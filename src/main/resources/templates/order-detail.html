<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                <li class="breadcrumb-item"><a th:href="@{/orders}">我的订单</a></li>
                <li class="breadcrumb-item active">订单详情</li>
            </ol>
        </nav>
        <div th:if="${order != null}">
            <h2 class="page-title"><i class="bi bi-receipt me-2"></i>订单详情<span class="order-status ms-3" th:classappend="${'status-' + order.status}" th:text="${order.status}">状态</span></h2>
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="checkout-section">
                        <h4><i class="bi bi-info-circle me-2"></i>基本信息</h4>
                        <div class="row g-3">
                            <div class="col-md-4"><div class="text-muted small">订单编号</div><div class="fw-bold" th:text="'#' + ${order.orderid}">#001</div></div>
                            <div class="col-md-4"><div class="text-muted small">下单日期</div><div class="fw-bold" th:text="${#temporals.format(order.orderdate, 'yyyy-MM-dd HH:mm')}">日期</div></div>
                            <div class="col-md-4"><div class="text-muted small">快递公司</div><div class="fw-bold" th:text="${order.courier}">快递</div></div>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <h4><i class="bi bi-box-seam me-2"></i>商品清单</h4>
                        <div class="table-responsive">
                            <table class="table">
                                <thead><tr><th>商品编号</th><th>数量</th><th>单价</th><th>小计</th></tr></thead>
                                <tbody><tr th:each="item : ${order.orderItems}"><td><code th:text="${item.itemid}">ITEM001</code></td><td th:text="${item.quantity}">1</td><td th:text="'¥' + ${item.unitprice}">¥0.00</td><td class="fw-bold" th:text="'¥' + ${item.quantity * item.unitprice}">¥0.00</td></tr></tbody>
                                <tfoot><tr><td colspan="3" class="text-end fw-bold">合计：</td><td class="fw-bold text-danger fs-5" th:text="'¥' + ${order.totalprice}">¥0.00</td></tr></tfoot>
                            </table>
                        </div>
                    </div>
                    <div class="checkout-section">
                        <h4><i class="bi bi-geo-alt me-2"></i>收货地址</h4>
                        <p class="mb-1" th:text="${order.shiptofirstname} + ' ' + ${order.shiptolastname}">姓名</p>
                        <p class="mb-1" th:text="${order.shipaddr1}">地址</p>
                        <p class="mb-0" th:text="${order.shipcity} + ', ' + ${order.shipstate} + ' ' + ${order.shipzip} + ', ' + ${order.shipcountry}">城市</p>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="checkout-section">
                        <h4><i class="bi bi-credit-card me-2"></i>支付信息</h4>
                        <div class="mb-3"><div class="text-muted small">信用卡类型</div><div class="fw-bold" th:text="${order.cardtype}">Visa</div></div>
                        <div class="mb-3"><div class="text-muted small">信用卡号</div><div class="fw-bold" th:text="${order.creditcard}">****</div></div>
                        <div class="mb-3"><div class="text-muted small">有效期</div><div class="fw-bold" th:text="${order.exprdate}">MM/YY</div></div>
                        <hr>
                        <div class="d-flex justify-content-between"><span class="fs-5 fw-bold">订单总额</span><span class="fs-4 fw-bold text-danger" th:text="'¥' + ${order.totalprice}">¥0.00</span></div>
                    </div>
                    <a th:href="@{/orders}" class="btn btn-outline-secondary w-100"><i class="bi bi-arrow-left me-1"></i>返回订单列表</a>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${order == null}">
            <i class="bi bi-exclamation-triangle d-block"></i><h4>订单不存在</h4>
            <a th:href="@{/orders}" class="btn btn-gradient"><i class="bi bi-arrow-left me-1"></i>返回订单列表</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
