<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product != null ? product.name + ' - JPetStore' : '商品详情'}">商品详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                <li class="breadcrumb-item" th:if="${product != null}"><a th:href="@{'/category/' + ${product.category}}" th:text="${product.category}">分类</a></li>
                <li class="breadcrumb-item active" th:text="${product != null ? product.name : '商品详情'}">商品</li>
            </ol>
        </nav>
        <div th:if="${product != null}">
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="bg-light rounded-4 d-flex align-items-center justify-content-center" style="height: 400px;">
                        <i class="bi bi-image text-muted" style="font-size: 5rem;"></i>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="product-detail-info">
                        <span class="badge bg-primary mb-3 px-3 py-2" th:text="${product.category}">分类</span>
                        <h2 th:text="${product.name}">商品名称</h2>
                        <p class="text-muted mt-3" th:text="${product.description}">商品描述</p>
                        <hr class="my-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-list-check me-2"></i>可选规格</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>规格编号</th><th>属性</th><th>价格</th><th>库存</th><th>操作</th></tr></thead>
                                <tbody>
                                <tr th:each="item : ${product.items}">
                                    <td><code th:text="${item.itemid}">ITEM001</code></td>
                                    <td th:text="${item.attr1}">属性1</td>
                                    <td><span class="fw-bold text-danger" th:text="'¥' + ${item.listprice}">¥0.00</span></td>
                                    <td>
                                        <span class="badge" th:classappend="${item.qty > 0} ? 'bg-success' : 'bg-danger'" th:text="${item.qty > 0} ? '有货 (' + ${item.qty} + ')' : '缺货'">库存</span>
                                    </td>
                                    <td>
                                        <form th:action="@{/api/cart/add}" method="post" class="d-inline" th:if="${item.qty > 0}">
                                            <input type="hidden" name="itemId" th:value="${item.itemid}">
                                            <button type="submit" class="btn btn-sm btn-gradient"><i class="bi bi-cart-plus me-1"></i>加入购物车</button>
                                        </form>
                                        <button class="btn btn-sm btn-outline-secondary disabled" th:if="${item.qty <= 0}">缺货</button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="text-center text-muted py-4" th:if="${#lists.isEmpty(product.items)}">
                            <i class="bi bi-info-circle me-2"></i>暂无可选规格
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${product == null}">
            <i class="bi bi-exclamation-triangle d-block"></i>
            <h4>商品不存在</h4>
            <p>该商品可能已下架或不存在</p>
            <a th:href="@{/}" class="btn btn-gradient"><i class="bi bi-arrow-left me-1"></i>返回首页</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
