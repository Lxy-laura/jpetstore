<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的心愿单 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/chatbot.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-4">
        <h2 class="page-title"><i class="bi bi-heart me-2"></i>我的心愿单</h2>
        <div th:if="${wishlist != null and !wishlist.isEmpty}">
            <div class="row g-4">
                <div class="col-md-6 col-lg-4 col-xl-3" th:each="product : ${wishlist.products}">
                    <div class="card product-card position-relative">
                        <button class="wishlist-btn active" onclick="removeFromWishlist('${product.productid}')" title="移出心愿单">
                            <i class="bi bi-heart-fill"></i>
                        </button>
                        <div class="card-img-top d-flex align-items-center justify-content-center bg-light" style="height: 200px;">
                            <img th:if="${product.image != null}" th:src="${product.image}" class="w-100 h-100" style="object-fit:cover;" alt="${product.name}">
                            <i th:unless="${product.image != null}" class="bi bi-image text-muted" style="font-size: 3rem;"></i>
                        </div>
                        <div class="card-body">
                            <span class="badge bg-primary badge-category mb-2" th:text="${product.category}">分类</span>
                            <h5 class="card-title" th:text="${product.name}">商品名称</h5>
                            <p class="card-text text-muted small" th:text="${#strings.abbreviate(product.description, 50)}">商品描述</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="price" th:text="'¥' + ${product.price}">¥0.00</span>
                                <a th:href="@{'/product/' + ${product.productid}}" class="btn btn-sm btn-gradient">
                                    <i class="bi bi-eye me-1"></i>查看
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <form th:action="@{/api/wishlist/clear}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger"><i class="bi bi-trash me-2"></i>清空心愿单</button>
                </form>
            </div>
        </div>
        <div class="empty-state" th:if="${wishlist == null or wishlist.isEmpty}">
            <i class="bi bi-heart d-block"></i>
            <h4>心愿单还是空的</h4>
            <p>去逛逛，把喜欢的商品收藏起来吧！</p>
            <a th:href="@{/}" class="btn btn-gradient"><i class="bi bi-arrow-left me-1"></i>去购物</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function removeFromWishlist(productId) {
        fetch('/api/wishlist/remove/' + productId, { method: 'POST' })
            .then(function() { window.location.reload(); });
    }
</script>
</body>
</html>
