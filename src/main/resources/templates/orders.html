<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-4">
        <h2 class="page-title"><i class="bi bi-receipt me-2"></i>我的订单</h2>
        <div th:if="${orders != null and !#lists.isEmpty(orders)}">
            <div class="row g-4">
                <div class="col-12" th:each="order : ${orders}">
                    <div class="card order-card">
                        <div class="card-body p-4">
                            <div class="row align-items-center">
                                <div class="col-md-3"><div class="text-muted small">订单编号</div><div class="fw-bold fs-5" th:text="'#' + ${order.orderid}">#001</div></div>
                                <div class="col-md-3"><div class="text-muted small">下单日期</div><div class="fw-bold" th:text="${#temporals.format(order.orderdate, 'yyyy-MM-dd HH:mm')}">2026-01-01</div></div>
                                <div class="col-md-3"><div class="text-muted small">订单金额</div><div class="fw-bold text-danger fs-5" th:text="'¥' + ${order.totalprice}">¥0.00</div></div>
                                <div class="col-md-2"><span class="order-status" th:classappend="${'status-' + order.status}" th:text="${order.status}">状态</span></div>
                                <div class="col-md-1 text-end"><a th:href="@{'/order/' + ${order.orderid}}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${orders == null or #lists.isEmpty(orders)}">
            <i class="bi bi-receipt d-block"></i><h4>暂无订单</h4><p>您还没有下过订单，快去选购吧！</p>
            <a th:href="@{/}" class="btn btn-gradient"><i class="bi bi-arrow-left me-1"></i>去购物</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
