<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - JPetStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card">
                    <div class="card-header"><h3><i class="bi bi-box-arrow-in-right me-2"></i>用户登录</h3></div>
                    <div class="card-body">
                        <div class="alert alert-danger d-none" id="loginError" role="alert"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="bi bi-person me-1"></i>用户名</label>
                                <input type="text" class="form-control" name="username" placeholder="请输入用户名" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-lock me-1"></i>密码</label>
                                <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>登录</button>
                        </form>
                        <div class="text-center">
                            <span class="text-muted">还没有账号？</span>
                            <a th:href="@{/register}" class="text-decoration-none fw-bold">立即注册</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var formData = new URLSearchParams();
        formData.append('username', this.username.value);
        formData.append('password', this.password.value);
        fetch('/api/account/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        }).then(function(res) { return res.json(); }).then(function(data) {
            if (data.code === 200) { window.location.href = '/'; }
            else { var el = document.getElementById('loginError'); el.textContent = data.message; el.classList.remove('d-none'); }
        }).catch(function() { var el = document.getElementById('loginError'); el.textContent = '网络错误，请重试'; el.classList.remove('d-none'); });
    });
</script>
</body>
</html>
