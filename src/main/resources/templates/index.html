<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPetStore - 宠物商店首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>
<main>
    <div class="hero-banner">
        <div class="container">
            <h1><i class="bi bi-paw-fill me-3"></i>欢迎来到 JPetStore</h1>
            <p class="mt-3">您值得信赖的宠物用品电商平台，为爱宠提供最好的商品和服务</p>
            <a th:href="@{/category/DOGS}" class="btn btn-light btn-lg mt-3 px-5 rounded-pill fw-bold">
                <i class="bi bi-arrow-right-circle me-2"></i>立即选购
            </a>
        </div>
    </div>
    <div class="container">
        <section class="mb-5">
            <h2 class="page-title text-center"><i class="bi bi-grid-3x3-gap-fill me-2"></i>商品分类</h2>
            <div class="row g-4">
                <div class="col-md-4 col-lg-2" th:each="category : ${categories}">
                    <a th:href="@{'/category/' + ${category.catid}}" class="text-decoration-none">
                        <div class="card category-card">
                            <div class="card-body">
                                    <span class="category-icon" th:switch="${category.catid}">
                                        <i class="bi bi-water" th:case="'FISH'"></i>
                                        <i class="bi bi-heart-pulse-fill" th:case="'DOGS'"></i>
                                        <i class="bi bi-emoji-smile-fill" th:case="'CATS'"></i>
                                        <i class="bi bi-bug-fill" th:case="'REPTILES'"></i>
                                        <i class="bi bi-feather" th:case="'BIRDS'"></i>
                                        <i class="bi bi-box-seam" th:case="*"></i>
                                    </span>
                                <h5 class="card-title" th:text="${category.name}">分类名称</h5>
                                <p class="card-text" th:text="${category.description}">分类描述</p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>
        <section class="mb-5">
            <h2 class="page-title text-center"><i class="bi bi-star-fill me-2"></i>全部商品</h2>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4 col-xl-3" th:each="product : ${products}">
                    <div class="card product-card">
                        <div class="card-img-top d-flex align-items-center justify-content-center bg-light" style="height: 200px;">
                            <img th:if="${product.image != null}" th:src="${product.image}" class="w-full h-full object-cover" alt="${product.name}">
                            <i th:unless="${product.image != null}" class="bi bi-image text-muted" style="font-size: 3rem;"></i>
                        </div>
                        <div class="card-body">
                            <span class="badge bg-primary badge-category mb-2" th:text="${product.category}">分类</span>
                            <h5 class="card-title" th:text="${product.name}">商品名称</h5>
                            <p class="card-text text-muted small" th:text="${#strings.abbreviate(product.description, 50)}">商品描述</p>
                            <a th:href="@{'/product/' + ${product.productid}}" class="btn btn-gradient w-100">
                                <i class="bi bi-eye me-1"></i>查看详情
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="empty-state" th:if="${#lists.isEmpty(products)}">
                <i class="bi bi-inbox d-block"></i>
                <h4>暂无商品</h4>
                <p>商品即将上架，敬请期待！</p>
            </div>
        </section>
    </div>
</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
